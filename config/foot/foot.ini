font=Hack-Regular:size=13
font-bold=Hack-Bold:size=13
font-italic=Hack-Italic:size=15
font-bold-italic=Hack-BoldItalic:size=15
font-size-adjustment=0.75
box-drawings-uses-font-glyphs=yes
# initial-window-size-pixels=600x400
initial-window-size-chars=80x24
initial-window-mode=windowed
pad=2x2center
resize-delay-ms=100

[cursor]
blink=yes
# blink-rate=700

# -*- conf -*-
# Deus
# Color palette based on: https://github.com/ajmwagar/vim-deus

[cursor]
color=2c323b eaeaea

[colors]
background=2c323b
foreground=eaeaea
regular0=242a32
regular1=d54e53
regular2=98c379
regular3=e5c07b
regular4=83a598
regular5=c678dd
regular6=70c0ba
regular7=eaeaea
bright0=666666
bright1=ec3e45
bright2=90c966
bright3=edbf69
bright4=73ba9f
bright5=c858e9
bright6=2bcec2
bright7=ffffff

