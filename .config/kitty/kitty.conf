# --- Theme Selection ---
# To switch: uncomment the one you want and hit Ctrl+Shift+F5
include themes/catppuccin-mocha.conf
# include themes/catppuccin-latte.conf

# --- Fonts ---
font_family      IntoneMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- Window & Performance ---
# We disable 'remember' so it always forces our large initial size
remember_window_size    no
initial_window_width    1920
initial_window_height   1080
window_padding_width    1
confirm_os_window_close 0
sync_to_monitor         yes

# HIDE THE TITLE BAR (GNOME/Wayland fix)
hide_window_decorations yes

# --- Cursor ---
cursor_shape           beam
cursor_beam_thickness  1.5
cursor_blink_interval  0

# --- Scrollback ---
scrollback_lines        10000
wheel_scroll_multiplier 3.0

# --- Key Bindings ---
# Map the same behavior as your Alacritty config
map ctrl+shift+plus     change_font_size all +1.0
map ctrl+shift+kp_add   change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+kp_subtract change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Clipboard
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Fullscreen Toggle (Just in case you need it)
map f11 toggle_fullscreen
