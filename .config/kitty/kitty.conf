# =============================================================================
# KITTY TERMINAL CONFIGURATION
# =============================================================================
# Theme: Catppuccin Mocha (with Latte as alternate)
# Font: IntoneMono Nerd Font
# Unified with: foot, alacritty, ghostty

# =============================================================================
# THEME
# =============================================================================

include themes/catppuccin-mocha.conf
# include themes/catppuccin-latte.conf


# =============================================================================
# FONTS
# =============================================================================

font_family      IntoneMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0


# =============================================================================
# WINDOW
# =============================================================================

remember_window_size    no
initial_window_width    1920
initial_window_height   1080
window_padding_width    1
hide_window_decorations yes
confirm_os_window_close 0
sync_to_monitor         yes


# =============================================================================
# CURSOR
# =============================================================================

cursor_shape           beam
cursor_beam_thickness  0.3
cursor_blink_interval  0
mouse_hide_wait        3.0


# =============================================================================
# SCROLLBACK
# =============================================================================

scrollback_lines        20000
wheel_scroll_multiplier 3.0


# =============================================================================
# MOUSE
# =============================================================================

# URLs & Hyperlinks (OSC 8)
allow_hyperlinks        yes
detect_urls             yes
underline_hyperlinks    hover


# =============================================================================
# SHELL INTEGRATION
# =============================================================================

# Auto-detects shell and enables: prompt marking, cwd reporting, etc.
shell_integration enabled


# =============================================================================
# KEYBINDINGS
# =============================================================================

# Clipboard
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Font Scaling
map ctrl+shift+plus     change_font_size all +1.0
map ctrl+shift+kp_add   change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+kp_subtract change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Window
map f11                 toggle_fullscreen
