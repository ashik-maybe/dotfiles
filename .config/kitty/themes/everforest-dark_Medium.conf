# vim:ft=kitty

## name:     Everforest Kitty Dark Medium
## author:   Ashik (based on sainnhe/everforest)
## license:  MIT
## blurb:    Earthy, desaturated, and easy on the eyes. Absolute cohesion with Everforest semantics.

# The basic colors
foreground              #D3C6AA
background              #2D353B
selection_foreground    #D3C6AA
selection_background    #543A48

# Cursor colors
cursor                  #D3C6AA
cursor_text_color       #2D353B

# Scrollbar colors
scrollbar_handle_color  #7A8478
scrollbar_track_color   #475258

# URL color when hovering with mouse
url_color               #7FBBB3

# Kitty window border colors
active_border_color     #A7C080
inactive_border_color   #475258
bell_border_color       #DBBC7F

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #2D353B
active_tab_background   #A7C080
inactive_tab_foreground #859289
inactive_tab_background #475258
tab_bar_background      #232A2E

# Colors for marks (marked text in the terminal)
mark1_foreground #2D353B
mark1_background #7FBBB3
mark2_foreground #2D353B
mark2_background #D699B6
mark3_foreground #2D353B
mark3_background #83C092

