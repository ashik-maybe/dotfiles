# Hydro Prompt but Improved

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
scan_timeout = 30
command_timeout = 500

format = """
$username\
$hostname\
$container\
$directory\
$git_branch\
$git_status\
$bun\
$nodejs\
$python\
$package\
$aws\
$azure\
$gcloud\
$kubernetes\
$docker_context\
$cmd_duration\
$line_break\
$status\
$character"""

# --- Identity & Context ---
[username]
style_user = "bright-black"
style_root = "white bold"
format = "[$user]($style)@"
show_always = false

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bright-black"
ssh_symbol = "о¬Ғ "

[container]
symbol = "п’· "
style = "bright-black"
format = "[$symbol $name]($style) "

# --- Filesystem ---
[directory]
style = "blue"
format = "[$path]($style) "
truncation_length = 0
truncation_symbol = "вҖҰ/"
read_only = " у°Ңҫ"

# --- Git ---
[git_branch]
style = "bright-black"
format = "[$branch]($style) "

[git_status]
conflicted = "вҖў"
ahead = "вҶ‘${count}"
behind = "вҶ“${count}"
diverged = "вҶ‘${ahead_count}вҶ“${behind_count}"
untracked = "вҖў"
stashed = "вҖў"
modified = "вҖў"
staged = "вҖў"
renamed = "вҖў"
deleted = "вҖў"
style = "yellow"
format = '([$all_status$ahead_behind]($style) )'

# --- Execution & State ---
[cmd_duration]
min_time = 1_000
format = "[$duration]($style) "
style = "bright-black"
show_milliseconds = false

[status]
style = "red"
symbol = "|"
format = "[$symbol $status]($style) "
disabled = false

# --- Runtimes & Project ---
[bun]
symbol = "оқҜ "
style = "bright-black"
format = "[$symbol$version]($style) "

[nodejs]
symbol = "оңҳ "
style = "green"
format = "[$symbol$version]($style) "

[python]
symbol = "оҲө "
format = "[$symbol$virtualenv]($style) "
style = "yellow"

[package]
symbol = "у°Ҹ— "
style = "cyan"
format = "[$symbol$version]($style) "

# --- Cloud & Infrastructure ---
[aws]
symbol = "пғҜ "
style = "cyan"
format = "[$symbol$profile]($style) "

[azure]
symbol = "оқ” "
style = "cyan"
format = "[$symbol$subscription]($style) "

[gcloud]
symbol = "уұҮ¶ "
style = "cyan"
format = "[$symbol$account]($style) "

[kubernetes]
symbol = "уұғҫ "
style = "cyan"
format = "[$symbol$context]($style) "

[docker_context]
symbol = "пҢҲ "
style = "cyan"
format = "[$symbol$context]($style) "

# --- Prompt ---
[character]
success_symbol = "[вқұ](magenta)"
error_symbol = "[вқұ](red)"
vimcmd_symbol = "[вқ®](magenta)"
vimcmd_visual_symbol = "[вқ®](magenta)"
vimcmd_replace_symbol = "[вқ®](magenta)"
