# ==============================================================================
# Pure Prompt Adaptation
# ==============================================================================

# Core Engine Timing & Geometry
add_newline = true
scan_timeout = 30
command_timeout = 500

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$package\
$nodejs\
$bun\
$python\
$fill\
$aws\
$kubernetes\
$docker_context\
$cmd_duration
$character"""

continuation_prompt = '[‚ĚĮ‚ĚĮ ](bold gray)'

[fill]
symbol = ' '

# Primary Prompt Symbols (Line 2)
[character]
success_symbol = '[‚ĚĮ](bold magenta)'
error_symbol   = '[‚ĚĮ](bold red)'
vicmd_symbol   = '[‚Ěģ](bold green)'

# System & Context Identity
[directory]
style                  = "bold blue"
read_only              = " ůįĆĺ"
truncation_length      = 0
before_repo_root_style = "dimmed blue"
repo_root_style        = "bold blue"

[username]
style_user  = "dimmed white"
style_root  = "bold red"
format      = "[$user]($style) "
show_always = false
disabled    = false

[hostname]
ssh_only = true
format   = "@[$hostname](dimmed white) "
disabled = false

# Version Control Systems
[git_branch]
symbol = "Ôźė "
style  = "bold white"
format = "on [$symbol$branch]($style) "

[git_status]
conflicted = '='
ahead      = '‚á°'
behind     = '‚á£'
diverged   = '‚áē'
untracked  = '?'
stashed    = '‚Č°'
modified   = '*'
staged     = '+'
renamed    = '¬Ľ'
deleted    = '‚úė'
style      = "bold gold"
format     = "([$all_status$ahead_behind]($style) )"

[git_state]
style = "bold red"
format = "([$state( $progress_current/$progress_total)]($style)) "

# Application Runtimes (Context-Aware)
[nodejs]
symbol = "Óúė "
style  = "bold green"
format = "via [$symbol($version )]($style)"

[bun]
symbol       = "ÓĚĮ "
style        = "bold xterm_214"
format       = "via [$symbol($version )]($style)"
detect_files = ["bun.lockb", "bun.lock", "bunfig.toml"]

[python]
symbol       = "ÓąĶ "
style        = "bold yellow"
format       = "via [$symbol($version )(($virtualenv) )]($style)"
detect_files = ["pyproject.toml", "uv.lock", ".python-version"]

# Cloud & DevOps Infrastructure (Right-Aligned)
[aws]
symbol        = "ÔÉĮ "
style         = "bold xterm_208"
format        = "using [$symbol$profile(($region))]($style) "
force_display = false

[kubernetes]
symbol   = "ůĪÉĺ "
style    = "bold cyan"
format   = "at [$symbol$context(($namespace))]($style) "
disabled = false

[docker_context]
symbol       = "ÔĆą "
style        = "bold blue"
format       = "on [$symbol($context )]($style)"
detect_files = ["Dockerfile", "docker-compose.yml", "docker-compose.yaml"]

# Performance Benchmarking
[cmd_duration]
min_time          = 5_000
style             = "bold yellow"
format            = "took [$duration]($style)"
show_milliseconds = false
