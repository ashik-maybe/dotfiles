# ~/.config/starship.toml
# Zephyr prompt

add_newline = false
scan_timeout = 10
command_timeout = 200

format = """$python$directory$character"""
right_format = """$status$cmd_duration$git_branch$git_status"""

[character]
success_symbol = "[❯](magenta)[❯](cyan)"
error_symbol = "[❯](yellow)[❯](red)"
vicmd_symbol = "[❮](magenta)[❮](cyan)"

[python]
format = '[(\($virtualenv\) )]($style)'
style = 'white'

[directory]
style = "blue"
truncation_length = 1
truncation_symbol = ""
fish_style_pwd_dir_length = 1
read_only = " 🔒"

[git_branch]
format = ' [$branch]($style)'
style = 'green'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "cyan"
stashed = "≡"
ahead = "⇡${count}"
behind = "⇣${count}"
modified = "•"
untracked = "•"
staged = "•"
ignore_submodules = true

[cmd_duration]
format = ' [$duration]($style)'
style = "yellow"
min_time = 1000
show_milliseconds = false

[line_break]
disabled = true

[status]
disabled = false
symbol = ' ✘'
style = "red"
