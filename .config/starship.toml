# ~/.config/starship.toml
"$schema" = 'https://starship.rs/config-schema.json'

# Core Performance Tuning
add_newline = true
scan_timeout = 30
command_timeout = 500

# Layout & Hierarchy
# Line 1: Workspace context, environment runtimes, and execution telemetry
# Line 2: Shell interaction character
format = """$directory$git_branch$git_status$python$nodejs$bun$fill$cmd_duration
$character"""
right_format = ""

# Prompt Symbols (Vi Mode Support)
[character]
success_symbol = "[❯](bold magenta)[❯](bold cyan)"
error_symbol = "[❯](bold yellow)[❯](bold red)"
vicmd_symbol = "[❮](bold magenta)[❮](bold cyan)"

# File System & Navigation
[directory]
style = "bold cyan"
truncation_length = 3
truncation_symbol = ""
fish_style_pwd_dir_length = 0
read_only = " 🔒"

# Telemetry Alignment
[fill]
symbol = " "

# Version Control
[git_branch]
symbol = " "
style = "bold green"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
conflicted = "═"
stashed = "≡"
modified = "•"
staged = "+"
renamed = "»"
deleted = "-"
untracked = "…"

# Language Runtimes
[python]
symbol = " "
style = "bold blue"
format = "via [$symbol($version )(\\($virtualenv\\))]($style) "
detect_extensions = ["py"]
detect_files = [".python-version", "uv.lock", "pyproject.toml", "requirements.txt", "Pipfile", "poetry.lock"]

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version)]($style) "
detect_extensions = ["js", "ts", "jsx", "tsx"]
detect_files = ["package.json", "package-lock.json", "yarn.lock", "pnpm-lock.yaml"]

[bun]
symbol = " "
style = "bold xterm_209"
format = "via [$symbol($version)]($style) "
detect_files = ["bun.lock", "bun.lockb", "bunfig.toml"]

# Command Telemetry
[cmd_duration]
min_time = 1000
style = "bold yellow"
format = "took [$duration]($style)"
