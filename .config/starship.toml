# ==============================================================================
# Aura Minimal Starship Prompt
# ==============================================================================

add_newline = true
command_timeout = 200

# Primary Layout
format = """
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

# Right Layout
right_format = """$cmd_duration$time"""

[character]
success_symbol = "[❯](bold #925fe9)"
error_symbol = "[✗](bold #e05f65)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
repo_root_style = "bold #925fe9"
format = "[$path]($style)[$read_only]($read_only_style) "
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "on [$branch]($style) "
style = "italic #925fe9"

[git_status]
# Clean Spacing UX: We let the engine inject a single space strictly BETWEEN active statuses
format     = '([$all_status]($style) )'
style      = "#925fe9"
ahead      = "⇡${count}"
behind     = "box_down:${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
conflicted = ""
untracked  = "?"
modified   = ""
staged     = "[+](dim #925fe9)"
stashed    = "[⚑](dim #925fe9)"
renamed    = "[→](dim #925fe9)"
deleted    = "[×](dim #925fe9)"

[cmd_duration]
min_time = 2_000
format = "[took $duration]($style) "
style = "dim text"

[time]
disabled = false
format = "[@ $time]($style) "
time_format = "%I:%M"
style = "dim text"

[package]
disabled = true

