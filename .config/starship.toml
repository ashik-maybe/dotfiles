"$schema" = 'https://starship.rs/config-schema.json'

# --- LAYOUT ---
format = """
$container$username$hostname$directory$git_branch$git_status$python$nodejs$bun$docker_context$jobs$cmd_duration$status$memory_usage
$character"""

right_format = """$time"""

[character]
success_symbol = "[‚ĚĮ](bold green)"
error_symbol = "[‚ĚĮ](bold red)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
# fish_style_pwd_dir_length = 1

# --- VIRTUALIZATION & REMOTE ---
[container]
symbol = "‚¨Ę "
format = "[$symbol ($name)]($style) "
style = "bold magenta"

[username]
style_user = "white bold"
style_root = "black bold"
format = "[$user]($style) "
disabled = false
show_always = false

[hostname]
ssh_only = true
format = "on [$hostname]($style) "
style = "bold dim white"

# --- GIT ---
[git_branch]
symbol = "Ôźė "
style = "bold purple"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
conflicted = "="
ahead = "‚á°"
behind = "‚á£"
diverged = "‚áē"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "¬Ľ"
deleted = "‚úė"

# --- LANGUAGES ---
[python]
symbol = "ÓąĶ "
# Detect uv-specific files
detect_files = ["uv.lock", "pyproject.toml"]
# Added detection for the local virtualenv folder
detect_folders = [".venv"]
# format: includes version and the virtualenv name if active
format = "via [${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
style = "yellow"
# Optional: Hide the default system python if no venv is active
# pyenv_version_name = true

[bun]
symbol = "ÓĚĮ "
detect_files = ["bun.lock", "bun.lockb"]
format = "[$symbol($version )]($style)"
style = "bold hex:fbf0df"

[nodejs]
symbol = "Óúė "
detect_files = ["package-lock.json"] # Triggers on NPM lock
format = "[$symbol($version )]($style)"
style = "green"

# --- TOOLS ---
[docker_context]
symbol = "ÔĆą "
format = "[$symbol]($style) "
style = "blue"

# --- PERFORMANCE & STATUS ---
[cmd_duration]
min_time = 2000
format = "took [ůĪéę $duration]($style) "
style = "dimmed yellow"

[jobs]
symbol = "ůĪóľ "
number_threshold = 1
format = "[$symbol$number]($style) "
style = "bold orange"

[status]
disabled = false
symbol = "‚úė"
format = '[$symbol $common_meaning$exit_code]($style) '
map_symbol = true
pipestatus = true
style = "bold red"

# --- HARDWARE ---
[memory_usage]
disabled = false
threshold = 80
symbol = "ůįćõ "
style = "bold dimmed red"
format = "mem [$symbol$percentage]($style) "

[battery]
full_symbol = "ůįĀĻ "
charging_symbol = "ůįāĄ "
discharging_symbol = "ůįāÉ "
display = [{ threshold = 15, style = "bold red" }]

# --- TIME ---
[time]
disabled = false
time_format = "%I:%M"
format = "[$time]($style)"
style = "dimmed white"
