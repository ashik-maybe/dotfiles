# =============================================================================
# STARSHIP PROMPT CONFIGURATION
# Theme: RosГ© Pine Moon (Modern Variant)
# =============================================================================

"$schema" = 'https://starship.rs/config-schema.json'

# --- Core Prompt Layout ------------------------------------------------------
format = """
$username\
$directory\
$git_branch\
$git_status\
$fill\
$bun\
$nodejs\
$conda\
$python\
$docker_context\
$kubernetes\
$aws\
$cmd_duration\
$status\
$time\n  \
[уұһӘ](fg:iris) \
"""

# --- Color Palette (RosГ© Pine Moon) ------------------------------------------
palette = "rose-pine-moon"

[palettes.rose-pine-moon]
overlay = '#393552'
love    = '#eb6f92'
gold    = '#f6c177'
rose    = '#ea9a97'
pine    = '#3e8fb0'
foam    = '#9ccfd8'
iris    = '#c4a7e7'

# --- Core Identity & Navigation ----------------------------------------------
[username]
disabled     = false
show_always  = true
format       = "[оӮ¶](fg:overlay)[ у°§ұ $user ]($style)[оӮҙ](fg:overlay) "
style_root   = "bg:overlay fg:iris"
style_user   = "bg:overlay fg:iris"

[directory]
format             = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay) "
style              = "bg:overlay fg:pine"
truncation_length  = 3
truncation_symbol  = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music     = "пҖҒ "
Pictures  = "пҖҫ "

# --- Dynamic Interface Spacing ----------------------------------------------
[fill]
style  = "fg:overlay"
symbol = " "

# --- Version Control Systems --------------------------------------------------
[git_branch]
format = "[оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay) "
style  = "bg:overlay fg:foam"
symbol = "пҗҳ"

[git_status]
disabled      = false
style         = "bg:overlay fg:love"
format        = '[оӮ¶](fg:overlay)([$all_status$ahead_behind]($style))[оӮҙ](fg:overlay) '
up_to_date    = '[ вң“ ](bg:overlay fg:iris)'
untracked     = '[?\($count\)](bg:overlay fg:gold)'
stashed       = '[\$](bg:overlay fg:iris)'
modified      = '[!\($count\)](bg:overlay fg:gold)'
renamed       = '[В»\($count\)](bg:overlay fg:iris)'
deleted       = '[вңҳ\($count\)](style)'
staged        = '[++\($count\)](bg:overlay fg:gold)'
ahead         = '[вҮЎ\(${count}\)](bg:overlay fg:foam)'
behind        = '[вҮЈ\(${count}\)](bg:rose)'
diverged      = 'вҮ•[\[](bg:overlay fg:iris)[вҮЎ\(${ahead_count}\)](bg:overlay fg:foam)[вҮЈ\(${behind_count}\)](bg:overlay fg:rose)[\]](bg:overlay fg:iris)'

# --- Language & Local Runtimes ----------------------------------------------
[nodejs]
disabled = false
format   = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
style    = "bg:overlay fg:pine"
symbol   = "у°Һҷ "

[bun]
disabled = false
format   = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
style    = "bg:overlay fg:pine"
symbol   = "оқҝ "

[python]
disabled = false
format   = " [оӮ¶](fg:overlay)[ $symbol$version ]($style)[оӮҙ](fg:overlay)"
style    = "bg:overlay fg:pine"
symbol   = 'оңј '

[conda]
disabled = false
format   = " [оӮ¶](fg:overlay)[ $symbol$environment ]($style)[оӮҙ](fg:overlay)"
style    = "bg:overlay fg:pine"
symbol   = 'рҹ…’ '

# --- Infrastructure & Containerization ---------------------------------------
[docker_context]
disabled = false
format   = " [оӮ¶](fg:overlay)[ $symbol$context ]($style)[оӮҙ](fg:overlay)"
style    = "bg:overlay fg:foam"
symbol   = "у°ЎЁ "

[kubernetes]
disabled = false
format   = " [оӮ¶](fg:overlay)[ $symbol$context ]($style)[оӮҙ](fg:overlay)"
style    = "bg:overlay fg:pine"
symbol   = "вҳё "

[aws]
disabled = false
format   = " [оӮ¶](fg:overlay)[ $symbol$profile ]($style)[оӮҙ](fg:overlay)"
style    = "bg:overlay fg:gold"
symbol   = "у°ёҸ "

# --- Shell Diagnostics & Metrics --------------------------------------------
[cmd_duration]
disabled = false
min_time = 2000
format   = " [оӮ¶](fg:overlay)[ уұҺ« $duration ]($style)[оӮҙ](fg:overlay)"
style    = "bg:overlay fg:gold"

[status]
disabled   = false
pipestatus = true
format     = " [оӮ¶](fg:overlay)[ у°ұ’ $status ]($style)[оӮҙ](fg:overlay)"
style      = "bg:overlay fg:love"

[time]
disabled    = false
use_12hr    = true
time_format = "%I:%M%P"
format      = " [оӮ¶](fg:overlay)[ $time у°ҙҲ ]($style)[оӮҙ](fg:overlay)"
style       = "bg:overlay fg:rose"
