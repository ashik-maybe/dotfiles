# =============================================================================
# ALACRITTY TERMINAL CONFIGURATION
# =============================================================================
# Theme: Catppuccin Mocha (with Latte as alternate)
# Font: IntoneMono Nerd Font
# Unified with: foot, kitty, ghostty

# =============================================================================
# GENERAL
# =============================================================================

general.import = [
  # "~/.config/alacritty/themes/catppuccin-latte.toml",
  "~/.config/alacritty/themes/catppuccin-mocha.toml"
]


# =============================================================================
# WINDOW
# =============================================================================

[window]
startup_mode = "Maximized"
decorations = "None"
padding = { x = 1, y = 1 }
opacity = 1


# =============================================================================
# FONTS
# =============================================================================

[font]
normal = { family = "IntoneMono Nerd Font", style = "Regular" }
bold = { family = "IntoneMono Nerd Font", style = "Bold" }
italic = { family = "IntoneMono Nerd Font", style = "Italic" }
bold_italic = { family = "IntoneMono Nerd Font", style = "Bold Italic" }
size = 12


# =============================================================================
# CURSOR
# =============================================================================

[cursor]
style = { shape = "Beam", blinking = "Off" }
thickness = 0.15


# =============================================================================
# SCROLLBACK
# =============================================================================

[scrolling]
history = 20000
multiplier = 3


# =============================================================================
# SELECTION
# =============================================================================

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"


# =============================================================================
# MOUSE
# =============================================================================

[mouse]
hide_when_typing = true


# =============================================================================
# BELL
# =============================================================================

[bell]
animation = "Linear"
duration = 0


# =============================================================================
# KEYBOARD
# =============================================================================

[keyboard]
bindings = [
  # Clipboard
  { key = "C",       mods = "Control|Shift", action = "Copy" },
  { key = "V",       mods = "Control|Shift", action = "Paste" },

  # Font Scaling
  { key = "Plus",    mods = "Control|Shift", action = "IncreaseFontSize" },
  { key = "Minus",   mods = "Control|Shift", action = "DecreaseFontSize" },
  { key = "Key0",    mods = "Control|Shift", action = "ResetFontSize" },

  # Fullscreen
  { key = "F11",     mods = "None",          action = "ToggleFullscreen" },
]


# =============================================================================
# TERMINAL
# =============================================================================

[terminal]
# Shell = defaults to $SHELL
osc52 = "OnlyCopy"
