# Config file for btop v.1.4.7

# =============================================================================
# THEME & GRAPHICS
# =============================================================================

# Path to your theme
color_theme = "/home/ashik/.config/btop/themes/everforest-medium.theme"

# Set to False to let your terminal's background (and transparency) shine through
theme_background = false

# Enable 24-bit truecolor for smooth gradients
truecolor = true
force_tty = false

# Rounded corners on info boxes
rounded_corners = true

# Reduces terminal flickering during fast refresh rates
terminal_sync = true

# Use high-resolution Braille symbols for detailed graphs
graph_symbol = "braille"
graph_symbol_cpu = "default"
graph_symbol_gpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"

# Show an easy-to-read digital clock at the top right
clock_format = "%X"

# =============================================================================
# NAVIGATION & LAYOUT
# =============================================================================

# Enable H, J, K, L (Vim keys) for lightning-fast scrolling and navigation
vim_keys = false
disable_mouse = false

# Show all standard monitoring panels by default
shown_boxes = "cpu mem net proc"

# Snappy 1.5-second update interval
update_ms = 1500

# Preset configurations (Cycle through layouts easily with the number keys 1-9)
disable_presets = "Off"
presets = "cpu:0:default,mem:0:default,net:0:default,proc:0:default cpu:0:default,proc:0:default"

# =============================================================================
# PROCESS PANEL (Optimized)
# =============================================================================

# Sort processes by memory consumption by default
proc_sorting = "memory"
proc_reversed = false

# Group processes cleanly by parent/child relationship
proc_tree = true

# Apply beautiful Gruvbox theme color gradients directly inside the process list
proc_colors = true
proc_gradient = true

# Show exact byte sizes for memory instead of vague percentages
proc_mem_bytes = true

# Keep live per-process CPU mini-graphs visible
proc_cpu_graphs = true
proc_info_smaps = false
proc_left = false
proc_filter_kernel = false

# Lock view onto a process when hitting Enter for detailed stats
proc_follow_detailed = true
proc_aggregate = false
keep_dead_proc_usage = false

# =============================================================================
# HARDWARE SENSORS & SYSTEM INFO
# =============================================================================

# CPU Graph layout
cpu_graph_upper = "Auto"
cpu_graph_lower = "Auto"
cpu_invert_lower = true
cpu_single_graph = false
cpu_bottom = false

# Hardware Telemetry
show_uptime = true
show_cpu_watts = true
check_temp = true
cpu_sensor = "Auto"
show_coretemp = true
cpu_core_map = ""
temp_scale = "celsius"
show_cpu_freq = true
freq_mode = "average"

# GPU Support configuration
show_gpu_info = "Auto"
shown_gpus = "nvidia amd intel"
gpu_mirror_graph = true
nvml_measure_pcie_speeds = true
rsmi_measure_pcie_speeds = true

# =============================================================================
# STORAGE & MEMORY
# =============================================================================

# Replace text bars with graphical representations for memory pools
mem_graphs = true
mem_below_net = false
zfs_arc_cached = true

# Include detailed storage tracking and swap allocation
show_swap = true
swap_disk = true
show_disks = true
only_physical = true
use_fstab = true
zfs_hide_datasets = false
disk_free_priv = false
show_io_stat = true
io_mode = false
io_graph_combined = false

# =============================================================================
# NETWORK & CONTROLS
# =============================================================================

# Dynamic network bandwidth scaling (scales automatically up and down)
net_auto = true
net_sync = true
net_iface = ""
base_10_sizes = false
base_10_bitrate = "Auto"
swap_upload_download = false

# Peripheral and internal battery metrics
show_battery = true
selected_battery = "Auto"
show_battery_watts = true

# System state controls
log_level = "WARNING"
save_config_on_exit = true
