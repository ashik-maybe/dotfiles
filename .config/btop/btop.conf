#? Config file for btop v. 1.3.0

#* Name of a btop++/bpytop/bashtop formatted ".theme" file, "Default" and "TTY" for builtin themes.
color_theme = "$HOME/.config/btop/themes/everforest-medium.theme"

#* If the theme set background should be shown, set to False for terminal transparency.
theme_background = False

#* Sets if 24-bit truecolor should be used.
truecolor = True

#* Set to true to force tty mode regardless if a real tty has been detected or not.
force_tty = False

#* Layout presets. Pressing 1 or 2 cycles between all boxes or a focused developer layout.
presets = "cpu:0:default,mem:0:default,net:0:default,proc:0:default cpu:0:default,proc:0:default"

#* Standard arrow keys active for navigation.
vim_keys = False

#* Rounded corners on boxes, is ignored if TTY mode is ON.
rounded_corners = True

#* Default symbols to use for graph creation. "braille" offers highest resolution.
graph_symbol = "braille"

graph_symbol_cpu = "default"
graph_symbol_gpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"

#* Manually set which boxes to show.
shown_boxes = "cpu mem net proc"

#* Update time in milliseconds. 1500ms is a sweet spot for responsive graphs without CPU bloat.
update_ms = 1500

#* SYSTEM MONITOR OPTIMIZED: Sorts by memory to pin heavy resource-hog processes to the top.
proc_sorting = "memory"

proc_reversed = False

#* Show processes as a tree structure (great for tracking parent/child processes).
proc_tree = True

#* Use the cpu graph colors in the process list.
proc_colors = True

#* Use a darkening gradient in the process list.
proc_gradient = True

proc_per_core = False
proc_mem_bytes = True
proc_cpu_graphs = True
proc_info_smaps = False
proc_left = False
proc_filter_kernel = False
proc_aggregate = False

cpu_graph_upper = "Auto"
cpu_graph_lower = "Auto"
show_gpu_info = "Auto"
cpu_invert_lower = True
cpu_single_graph = False
cpu_bottom = False

#* Shows the system uptime in the CPU box.
show_uptime = True

#* Show cpu temperature.
check_temp = True
cpu_sensor = "Auto"
show_coretemp = True
cpu_core_map = ""
temp_scale = "celsius"

#* Use base 2 sizes (KiB/MiB) which matches terminal standards accurately.
base_10_sizes = False

show_cpu_freq = True

#* Added Day, Month, and Date alongside the time so you don't have to check your status bar.
clock_format = "%a %b %d %X"

background_update = True
custom_cpu_name = ""
disks_filter = ""

#* Show graphs instead of meters for memory values for historical tracking.
mem_graphs = True

mem_below_net = False
zfs_arc_cached = True

#* Show swap memory inside the memory box.
show_swap = True

#* Set to False so swap doesn't steal space as a "fake disk", keeping your real drive stats clean.
swap_disk = False

#* Split mem box to show active storage drives.
show_disks = True

only_physical = True
use_fstab = True
zfs_hide_datasets = False
disk_free_priv = False

#* Toggles if io activity % (disk busy time) should be shown.
show_io_stat = True

io_mode = False
io_graph_combined = False
io_graph_speeds = ""

net_download = 100
net_upload = 100

#* Dynamic auto-rescaling for network bandwidth graph.
net_auto = True
net_sync = True
net_iface = ""

#* Show battery status if you are on a laptop.
show_battery = True
selected_battery = "Auto"

log_level = "WARNING"

#* Disabled by default to prevent micro-stutters/polling lag on certain NVIDIA GPU drivers.
nvml_measure_pcie_speeds = False

gpu_mirror_graph = True
custom_gpu_name0 = ""
custom_gpu_name1 = ""
custom_gpu_name2 = ""
custom_gpu_name3 = ""
custom_gpu_name4 = ""
custom_gpu_name5 = ""
