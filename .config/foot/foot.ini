# =============================================================================
# FOOT TERMINAL CONFIGURATION
# =============================================================================

# =============================================================================
# MAIN
# =============================================================================

[main]
term=foot
initial-window-mode=maximized
workers=4

# --- Performance (low-end CPU optimized) ---
dpi-aware=no
gamma-correct-blending=no

# --- Window Behavior ---
resize-by-cells=yes
resize-keep-grid=yes
resize-delay-ms=120
box-drawings-uses-font-glyphs=no

# --- Theme Selection ---
initial-color-theme=dark
include=~/.config/foot/everforest-dark_Medium


# =============================================================================
# FONTS
# =============================================================================

font=monospace:size=12
font-bold=monospace:style=Bold:size=12
font-italic=monospace:style=Italic:size=12
font-bold-italic=monospace:style=Bold Italic:size=12

font-size-adjustment=0.5
letter-spacing=0


# =============================================================================
# WINDOW
# =============================================================================

[csd]
preferred=client


# =============================================================================
# CURSOR
# =============================================================================

[cursor]
style=beam
blink=yes
beam-thickness=2


# =============================================================================
# SCROLLBACK
# =============================================================================

[scrollback]
lines=20000
multiplier=3.0
indicator-position=relative


# =============================================================================
# MOUSE
# =============================================================================

[mouse]
hide-when-typing=yes
alternate-scroll-mode=yes


# =============================================================================
# SECURITY
# =============================================================================

[security]
osc52=enabled


# =============================================================================
# BELL
# =============================================================================

[bell]
system=no


# =============================================================================
# KEYBINDINGS
# =============================================================================

[key-bindings]

# Clipboard
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
primary-paste=Shift+Insert

# Terminal
spawn-terminal=Control+Shift+n
search-start=Control+Shift+r

# Font Scaling
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0

# Scrollback
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
scrollback-home=Control+Home
scrollback-end=Control+End

# URLs
show-urls-launch=Control+Shift+o
show-urls-persistent=Control+Shift+p

# Theme Toggle
color-theme-toggle=Control+Shift+t


# =============================================================================
# MOUSE BINDINGS
# =============================================================================

[mouse-bindings]

# Paste
primary-paste=BTN_MIDDLE

# Selection
select-begin=BTN_LEFT
select-extend=BTN_RIGHT
select-word=BTN_LEFT-2
select-quote=BTN_LEFT-3
select-row=BTN_LEFT-4

# Font Scaling
font-increase=Control+BTN_WHEEL_BACK
font-decrease=Control+BTN_WHEEL_FORWARD

# Scrollback
scrollback-up-mouse=BTN_WHEEL_BACK
scrollback-down-mouse=BTN_WHEEL_FORWARD
