# =============================================================================
# ModernZ Configuration - Catppuccin Mocha Theme
# Accent: Mauve (#cba6f7)
# =============================================================================

# -----------------------------------------------------------------------------
# Colors - Catppuccin Mocha Palette
# -----------------------------------------------------------------------------
# Background
osc_color=#1e1e2e

# Text
window_title_color=#cdd6f4
window_controls_color=#cdd6f4
title_color=#cdd6f4
time_color=#cdd6f4
chapter_title_color=#cdd6f4
cache_info_color=#cdd6f4

# Buttons
side_buttons_color=#cdd6f4
middle_buttons_color=#cdd6f4
playpause_color=#cba6f7
hover_effect_color=#cba6f7

# Seekbar (Mauve accent)
seekbarfg_color=#cba6f7
seekbarbg_color=#45475a
seekbar_cache_color=#45475a
nibble_color=#cba6f7
nibble_current_color=#cdd6f4

# Window controls hover
windowcontrols_close_hover=#f38ba8
windowcontrols_max_hover=#f9e2af
windowcontrols_min_hover=#a6e3a1

# Fade
fade_alpha=200

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
layout=modern
top_buttons_bar=auto
playlist_button=yes

# -----------------------------------------------------------------------------
# Visibility
# -----------------------------------------------------------------------------
visibility=auto
deadzone=true
deadzone_size=0
deadzone_fadeout_time=500

# -----------------------------------------------------------------------------
# Styling
# -----------------------------------------------------------------------------
seek_handle_size=0
title_font_size=20
font=Roboto Bold
font_color=#cdd6f4

# -----------------------------------------------------------------------------
# Icons
# -----------------------------------------------------------------------------
icon_theme=fluent
icon_style=outline

# -----------------------------------------------------------------------------
# Language
# -----------------------------------------------------------------------------
language=en
