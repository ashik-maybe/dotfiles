# =============================================================================
# MPV Input Configuration
# =============================================================================

# Core Playback
SPACE               cycle pause
k                   cycle pause
f                   cycle fullscreen
ESC                 set fullscreen no
m                   cycle mute
q                   quit
Q                   quit-watch-later
MBTN_LEFT           cycle pause
MBTN_LEFT_DBL       cycle fullscreen

# Seeking
LEFT                seek -5
RIGHT               seek 5
j                   seek -10
l                   seek 10
Shift+LEFT          seek -1 exact
Shift+RIGHT         seek 1 exact
Shift+BACKSPACE     revert-seek

# Volume
UP                  add volume 5
DOWN                add volume -5

# Speed Control
[                   multiply speed 0.9
]                   multiply speed 1.1
Alt+1               set speed 1.0
Alt+2               set speed 1.25
Alt+3               set speed 1.5
Alt+4               set speed 1.75
Alt+5               set speed 2.0

# Audio & Subtitles
c                   cycle sub
v                   cycle sub-visibility
a                   cycle audio
Ctrl+LEFT           sub-seek -1
Ctrl+RIGHT          sub-seek 1

# Playlist & Looping
<                   playlist-prev
>                   playlist-next
ENTER               playlist-next
L                   cycle-values loop-file inf no
Ctrl+Shift+L        cycle-values loop-playlist inf no

# Chapters
PGUP                add chapter -1
PGDWN               add chapter 1

# Menus & Utility
F8                  script-binding select/select-playlist
F9                  script-binding select/select-track
?                   script-binding stats/display-page-4
Ctrl+v              playlist-append ${clipboard}
Ctrl+r              reload
