# =============================================================================
# MPV Input Configuration
# YouTube-inspired keybindings
# =============================================================================

# -----------------------------------------------------------------------------
# Core Playback
# -----------------------------------------------------------------------------
SPACE               cycle pause
k                   cycle pause
q                   quit
Q                   quit-watch-later
f                   cycle fullscreen
ESC                 set fullscreen no
m                   cycle mute
UP                  add volume 5
DOWN                add volume -5

# -----------------------------------------------------------------------------
# Seeking
# -----------------------------------------------------------------------------
LEFT                seek -5
RIGHT               seek 5
j                   seek -10
l                   seek 10
Shift+LEFT          seek -60
Shift+RIGHT         seek 60
0                   seek 0 absolute-percent
1                   seek 10 absolute-percent
2                   seek 20 absolute-percent
3                   seek 30 absolute-percent
4                   seek 40 absolute-percent
5                   seek 50 absolute-percent
6                   seek 60 absolute-percent
7                   seek 70 absolute-percent
8                   seek 80 absolute-percent
9                   seek 90 absolute-percent

# -----------------------------------------------------------------------------
# Speed Control
# -----------------------------------------------------------------------------
[                   multiply speed 0.95
]                   multiply speed 1.05
<                   playlist-prev
>                   playlist-next
\                   set speed 1.0
Alt+1               set speed 1.0
Alt+2               set speed 1.25
Alt+3               set speed 1.5
Alt+4               set speed 1.75
Alt+5               set speed 2.0
Alt+6               set speed 2.25
Alt+7               set speed 2.5
Alt+8               set speed 2.75
Alt+9               set speed 3.0

# -----------------------------------------------------------------------------
# Audio & Subtitles
# -----------------------------------------------------------------------------
v                   cycle sub-visibility
c                   cycle sub
a                   cycle audio
h                   add sub-delay 0.1
g                   add sub-delay -0.1
Alt+0               add sub-delay 0
Alt+Shift+0         add audio-delay 0
Ctrl+Shift+LEFT     add sub-delay -0.1
Ctrl+Shift+RIGHT    add sub-delay 0.1
Alt+j               add sub-scale -0.1
Alt+k               add sub-scale 0.1
y                   add chapter -1
Shift+y             add chapter 1
Ctrl+LEFT           add chapter -1
Ctrl+RIGHT          add chapter 1
Shift+p             playlist-prev
Shift+n             playlist-next

# -----------------------------------------------------------------------------
# Frame Stepping
# -----------------------------------------------------------------------------
.                   no-osd seek 1 exact ; set pause yes
,                   no-osd seek -1 exact ; set pause yes

# -----------------------------------------------------------------------------
# Video Adjustment
# -----------------------------------------------------------------------------
Alt+UP              add brightness 2
Alt+DOWN            add brightness -2
Alt+LEFT            add contrast -2
Alt+RIGHT           add contrast 2
r                   add video-rotate -90
t                   add video-rotate 90
Alt+r               set speed 1.0; set volume 100; set mute no; set contrast 0; set brightness 0; set saturation 0; set gamma 0; set hue 0; set video-zoom 0; set panscan 0; set video-rotate 0; set sub-delay 0; set sub-scale 1.0; set audio-delay 0
A                   cycle-values video-aspect "16:9" "4:3" "2.35:1" "no"
z                   cycle video-zoom

# -----------------------------------------------------------------------------
# Screenshots & Debug
# -----------------------------------------------------------------------------
o                   cycle osc
d                   cycle deband
i                   script-binding stats/display-stats
L                   cycle loop-file
s                   screenshot
Shift+s             screenshot video-only
~                   cycle ontop
