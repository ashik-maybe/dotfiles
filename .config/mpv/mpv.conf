# =============================================================================
# MPV Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Video Output & Hardware Decoding
# -----------------------------------------------------------------------------
vo=gpu
hwdec=auto

# -----------------------------------------------------------------------------
# Frame Pacing
# -----------------------------------------------------------------------------
video-sync=audio
interpolation=no

# -----------------------------------------------------------------------------
# Scaling (fast algorithms for low-end CPU)
# -----------------------------------------------------------------------------
scale=bilinear
cscale=bilinear

# -----------------------------------------------------------------------------
# Dithering & Banding
# -----------------------------------------------------------------------------
dither-depth=auto
deband=no

# -----------------------------------------------------------------------------
# HDR (disabled for performance)
# -----------------------------------------------------------------------------
hdr-compute-peak=no

# -----------------------------------------------------------------------------
# Playback Behavior
# -----------------------------------------------------------------------------
keep-open=yes
keep-open-pause=yes
save-position-on-quit=yes
resume-playback=yes
autoload-files=yes
audio-file-auto=fuzzy

# -----------------------------------------------------------------------------
# Caching (reduced for low memory)
# -----------------------------------------------------------------------------
cache=yes
cache-on-disk=no
demuxer-max-bytes=50MiB
demuxer-max-back-bytes=25MiB

# -----------------------------------------------------------------------------
# Frame Dropping (prevent lag on slow hardware)
# -----------------------------------------------------------------------------
framedrop=vo

# -----------------------------------------------------------------------------
# YouTube / Streaming
# -----------------------------------------------------------------------------
ytdl-format=bestvideo[height<=1080]+bestaudio/best[height<=1080]

# -----------------------------------------------------------------------------
# OSD & Window
# -----------------------------------------------------------------------------
osc=no
cursor-autohide=500
geometry=50%
save-window-position=yes
autofit-larger=90%x90%

# -----------------------------------------------------------------------------
# Audio
# -----------------------------------------------------------------------------
volume=50
volume-max=150
alang=en,eng
logarithmic-fade=yes

# -----------------------------------------------------------------------------
# Subtitles (PGS/Blu-ray support)
# -----------------------------------------------------------------------------
sub-pgs-vobsub=prefer
slang=en,eng
sub-auto=fuzzy
sub-font=Roboto Bold
sub-font-size=40
sub-color=1/1/1
sub-shadow-color=0/0/0/0.75
sub-border-color=0/0/0/0.95

# -----------------------------------------------------------------------------
# Screenshots
# -----------------------------------------------------------------------------
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-png-compression=7
screenshot-directory=~/Pictures/mpv-screenshots

# -----------------------------------------------------------------------------
# Utility
# -----------------------------------------------------------------------------
stop-screensaver=yes
