# =============================================================================
# MPV Configuration
# =============================================================================

# Video Output & Hardware Decoding
vo=gpu-next
hwdec=auto

# Scaling & Processing (Fast / Low-Power)
scale=bilinear
cscale=bilinear
dscale=bilinear
correct-downscaling=no
linear-downscaling=no
sigmoid-upscaling=no
interpolation=no
deband=no
hdr-compute-peak=no
dither-depth=auto

# Frame Sync
video-sync=audio
framedrop=vo

# Cache
cache=yes
cache-on-disk=no
demuxer-max-bytes=64MiB
demuxer-max-back-bytes=32MiB

# Playback Behavior
keep-open=yes
keep-open-pause=yes
save-position-on-quit=yes
resume-playback=yes
autoload-files=yes
audio-file-auto=fuzzy

# Streaming
ytdl-format=bestvideo[height<=720]+bestaudio/best[height<=720]

# Interface & Window
osc=yes
cursor-autohide=500
autofit=70%
autofit-larger=90%x90%
autofit-smaller=50%
save-window-position=no
maximized=no

# Audio
volume=50
volume-max=150
alang=en,eng
logarithmic-fade=yes

# Subtitles
sub-pgs-vobsub=prefer
slang=en,eng
sub-auto=fuzzy
sub-font="Roboto"
sub-font-size=40
sub-color=1/1/1
sub-shadow-color=0/0/0/0.75
sub-border-color=0/0/0/0.95

# Screenshots
screenshot-format=jpg
screenshot-jpeg-quality=90
screenshot-directory=~/Pictures/mpv-screenshots

# Utility
stop-screensaver=yes
